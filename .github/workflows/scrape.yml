name: CaddyComps Scheduled Scraper

on:
  schedule:
    # Runs at 19:58 UTC (GMT) on Sunday (0) and Wednesday (3)
    - cron: '58 19 * * 0,3'
  workflow_dispatch: # Allows you to trigger the scraper manually anytime via a button

jobs:
  scrape_and_email:
    runs-on: ubuntu-latest
    
    # This permission is CRITICAL. It allows the GitHub bot to push the CSV back to the repo.
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install --with-deps chromium

      - name: Run Scraper and Send Email
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python cloud_scraper.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add caddycomps_master_data.csv
          
          # Only commit if the CSV actually changed (prevents errors if the scrape failed)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update master scraped data" && git push)
